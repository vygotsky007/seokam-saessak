<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>에듀테크 추천 · 석암초 교사 큐레이션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#F3F4F7; --surface:#FFFFFF; --ink:#1E2330; --ink-soft:#5B6373; --ink-faint:#8A91A0;
    --line:#E7E9EF; --line-soft:#EFF1F5; --seal:#2E3D78; --seal-bg:#EAEDF8; --star:#E0A33C;
    --shadow:0 1px 2px rgba(28,33,48,.04), 0 6px 20px rgba(28,33,48,.06);
    --shadow-hi:0 4px 10px rgba(28,33,48,.08), 0 18px 40px rgba(28,33,48,.12); --r:18px;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg); color:var(--ink); font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5}
  .wrap{max-width:1180px; margin:0 auto; padding:0 22px}
  .hero{padding:44px 0 22px}
  .eyebrow{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color:var(--seal); background:var(--seal-bg); padding:5px 11px; border-radius:999px}
  .hero h1{margin:15px 0 9px; font-size:clamp(28px,4.4vw,42px); font-weight:800; letter-spacing:-.02em; line-height:1.08}
  .hero p{margin:0; max-width:640px; font-size:15.5px; color:var(--ink-soft)}
  .hero .seal-note{color:var(--seal); font-weight:600}
  .toolbar{position:sticky; top:0; z-index:20; background:rgba(243,244,247,.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); padding:12px 0}
  .toolbar .wrap{display:flex; flex-direction:column; gap:10px}
  .chips{display:flex; gap:7px; flex-wrap:wrap}
  .chip{cursor:pointer; border:1px solid var(--line); background:var(--surface); color:var(--ink-soft); font-size:13px; font-weight:600; padding:6px 12px; border-radius:999px; transition:.15s; white-space:nowrap}
  .chip:hover{border-color:#D6DAE4}
  .chip.on{color:#fff; border-color:transparent}
  .chip.on.allchip{background:var(--ink)}
  .row2{display:flex; gap:9px; align-items:center; flex-wrap:wrap}
  .seg{display:inline-flex; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:3px; flex-wrap:wrap}
  .seg button{cursor:pointer; border:0; background:transparent; color:var(--ink-soft); font-family:inherit; font-size:12.5px; font-weight:600; padding:5px 10px; border-radius:8px}
  .seg button.on{background:var(--ink); color:#fff}
  .toggle{display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none; border:1px solid var(--line); background:var(--surface); border-radius:11px; padding:6px 12px; font-size:12.5px; font-weight:600; color:var(--ink-soft)}
  .toggle.on{border-color:var(--seal); color:var(--seal); background:var(--seal-bg)}
  .toggle .dot{width:9px; height:9px; border-radius:50%; background:#CBD0DC}
  .toggle.on .dot{background:var(--seal)}
  .search{flex:1; min-width:160px; display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:0 12px}
  .search input{border:0; outline:0; background:transparent; font-family:inherit; font-size:14px; color:var(--ink); padding:9px 0; width:100%}
  .search svg{color:var(--ink-faint); flex-shrink:0}
  .count{padding:18px 0 6px; font-size:13px; color:var(--ink-faint); font-weight:500}
  .count b{color:var(--ink-soft); font-weight:700}
  .grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:8px 0 70px}
  @media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .card{position:relative; background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:16px; cursor:pointer; transition:transform .16s, box-shadow .16s, border-color .16s; box-shadow:var(--shadow); display:flex; flex-direction:column; min-height:150px; overflow:hidden}
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent)}
  .card:hover{transform:translateY(-3px); box-shadow:var(--shadow-hi); border-color:#DCE0EA}
  .card .top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px}
  .logo{width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:var(--accent-soft); flex-shrink:0; overflow:hidden}
  .logo img{width:28px; height:28px; object-fit:contain; display:block}
  .logo .ini{font-size:17px; font-weight:800; color:var(--accent)}
  .badges{display:flex; gap:5px; align-items:center; flex-wrap:wrap; justify-content:flex-end}
  .seal{display:inline-flex; align-items:center; gap:3px; background:var(--seal); color:#fff; font-size:10.5px; font-weight:700; padding:3px 8px 3px 6px; border-radius:999px}
  .seal svg{width:12px; height:12px}
  .rec{display:inline-flex; align-items:center; gap:3px; color:var(--star); background:#FBF1DD; font-size:10.5px; font-weight:700; padding:3px 8px 3px 6px; border-radius:999px}
  .rec svg{width:11px; height:11px}
  .card h3{margin:12px 0 2px; font-size:15.5px; font-weight:800; letter-spacing:-.01em; line-height:1.25}
  .card .desc{margin:6px 0 0; font-size:12.5px; color:var(--ink-soft); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .card .foot{margin-top:auto; padding-top:12px; display:flex; align-items:center; gap:6px; flex-wrap:wrap}
  .subtag{font-size:11px; font-weight:700; color:#fff; background:var(--accent); padding:3px 8px; border-radius:7px}
  .gtag{font-size:11px; font-weight:600; color:var(--ink-soft); background:var(--line-soft); padding:3px 7px; border-radius:7px}
  .empty{padding:60px 20px; text-align:center; color:var(--ink-faint); font-size:14.5px}
  .modal{position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; padding:20px}
  .modal[hidden]{display:none}
  .modal .ov{position:absolute; inset:0; background:rgba(24,28,40,.42); backdrop-filter:blur(2px)}
  .sheet{position:relative; background:var(--surface); width:100%; max-width:500px; max-height:86vh; overflow:auto; border-radius:22px; box-shadow:var(--shadow-hi); padding:26px}
  .sheet .x{position:absolute; top:16px; right:16px; width:34px; height:34px; border:0; border-radius:10px; background:var(--line-soft); color:var(--ink-soft); cursor:pointer; display:flex; align-items:center; justify-content:center}
  .m-top{display:flex; gap:14px; align-items:center}
  .m-logo{width:60px; height:60px; border-radius:15px; display:flex; align-items:center; justify-content:center; background:var(--accent-soft); flex-shrink:0; overflow:hidden}
  .m-logo img{width:38px; height:38px; object-fit:contain}
  .m-logo .ini{font-size:23px; font-weight:800; color:var(--accent)}
  .sheet h2{margin:0 0 3px; font-size:20px; font-weight:800; letter-spacing:-.01em}
  .domain{font-size:12px; color:var(--ink-faint); font-weight:500}
  .m-badges{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap}
  .m-desc{margin:17px 0 0; font-size:14px; color:var(--ink-soft); line-height:1.6}
  .m-meta{margin-top:15px; display:flex; gap:7px; flex-wrap:wrap}
  .go{margin-top:19px; display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:var(--accent); color:#fff; border:0; border-radius:13px; padding:13px; font-family:inherit; font-size:14.5px; font-weight:700; cursor:pointer; text-decoration:none}
  .go.ghost{background:var(--line-soft); color:var(--ink-soft)}
  .seal-stamp{display:inline-flex; align-items:center; gap:5px; background:var(--seal); color:#fff; font-size:12px; font-weight:700; padding:5px 11px 5px 9px; border-radius:999px}
  .seal-stamp svg{width:15px;height:15px}
  .rec-stamp{display:inline-flex; align-items:center; gap:4px; color:var(--star); background:#FBF1DD; font-size:12px; font-weight:700; padding:5px 11px; border-radius:999px}
  .rec-stamp svg{width:14px;height:14px}

  .fab{position:fixed; right:22px; bottom:22px; z-index:40; display:none; align-items:center; gap:7px; background:var(--seal); color:#fff; border:0; border-radius:14px; padding:13px 17px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; box-shadow:var(--shadow-hi)}
  body.admin .fab{display:inline-flex}
  .fld{margin-top:12px} .fld label{display:block; font-size:12.5px; font-weight:700; color:var(--ink-soft); margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 11px; font-family:inherit; font-size:14px; outline:0}
  .gchk{display:flex; gap:6px; flex-wrap:wrap} .gchk label{display:inline-flex; align-items:center; gap:4px; font-weight:600; background:var(--line-soft); padding:6px 10px; border-radius:9px; cursor:pointer; margin:0}
  .gchk input{width:auto}
  .del{margin-top:10px; width:100%; background:#FBEAEA; color:#C0473F; border:0; border-radius:11px; padding:10px; font-family:inherit; font-weight:700; cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <span class="eyebrow">석암초 교사 큐레이션</span>
    <h1>에듀테크 추천</h1>
    <p>수업에 바로 쓰는 도구를 과목·상황별로 골라 보세요. <span class="seal-note">석암 인증</span>은 우리 학교가 함께 써보고 검증한 도구예요.</p>
  </header>
</div>
<div class="toolbar">
  <div class="wrap">
    <div class="chips" id="subjectChips"></div>
    <div class="row2">
      <div class="seg" id="gradeSeg"></div>
      <div class="toggle" id="certToggle"><span class="dot"></span> 석암 인증만</div>
      <div class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="이름·내용 검색" autocomplete="off">
      </div>
    </div>
  </div>
</div>
<div class="wrap">
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>조건에 맞는 도구가 없어요. 과목이나 학년을 바꿔 보세요.</div>
</div>
<button class="fab" id="fab">＋ 도구 추가</button>
<div class="modal" id="modal" hidden>
  <div class="ov" data-close></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>
</div>
<script>
const CATS = {
 '국어':'#E15B53','수학':'#3F84CC','사회':'#C77B3C','과학':'#5FA055','영어':'#E2A33C',
 '음악':'#C760A8','미술':'#E0795F','코딩':'#7C6CD6','평가':'#1FA39A','AI':'#4F5BD5',
 '놀이':'#EA9A33','창체':'#5FA0A8','학급':'#9B6BB0','업무':'#6B7280','공통':'#7A8290','기타':'#9AA0AC'
};
let TOOLS = [];
const CATORDER = Object.keys(CATS);
const GRADES = ['전체','1','2','3','4','5','6'];
const ICON = {
  seal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2 1.6 2.5-.4 1 2.4 2.3 1.1-.4 2.5L22 12l-1.6 2-.4 2.5-2.5.4-1 2.4-2.5-.4L12 21l-2-1.1-2.5.4-1-2.4-2.5-.4-.4-2.5L2 12l1.6-2 .4-2.5L6.5 7l1-2.4 2.5.4z"/><path d="M9 12l2 2 4-4"/></svg>',
  star:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 17.8 6.1 20.9l1.2-6.5L2.5 8.9 9.1 8z"/></svg>',
  ext:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M18 14v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1h5"/></svg>',
  search:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  x:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>'
};
const tint = h => h+'1A';
const initial = n => (n.replace(/[^A-Za-z가-힣0-9]/g,'').charAt(0) || n.charAt(0));
const fav = d => 'https://www.google.com/s2/favicons?domain='+d+'&sz=128';
let fSub='전체', fGrade='전체', fCert=false, fQ='';

const sc=document.getElementById('subjectChips');
sc.innerHTML=`<button class="chip allchip on" data-s="전체">전체</button>`+CATORDER.map(s=>`<button class="chip" data-s="${s}">${s}</button>`).join('');
sc.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  fSub=c.dataset.s; sc.querySelectorAll('.chip').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color='';});
  c.classList.add('on'); if(fSub!=='전체'){c.style.background=CATS[fSub];c.style.color='#fff';} render();
}));
const gs=document.getElementById('gradeSeg');
gs.innerHTML=GRADES.map((g,i)=>`<button class="${i===0?'on':''}" data-g="${g}">${g==='전체'?'전 학년':g+'학년'}</button>`).join('');
gs.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{fGrade=b.dataset.g;gs.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();}));
const ct=document.getElementById('certToggle');
ct.addEventListener('click',()=>{fCert=!fCert;ct.classList.toggle('on',fCert);render();});
document.getElementById('search').addEventListener('input',e=>{fQ=e.target.value.trim().toLowerCase();render();});

function match(t){
  if(fSub!=='전체' && t.subj[0]!==fSub) return false;
  if(fGrade!=='전체' && !(t.grades||[]).includes(+fGrade)) return false;
  if(fCert && !t.cert) return false;
  if(fQ && !((t.name+' '+t.desc).toLowerCase().includes(fQ))) return false;
  return true;
}
function gradeLabel(t){
  if(t.teacher) return '교사용';
  const g=t.grades||[]; if(!g.length) return '전 학년';
  if(g.length>=6) return '전 학년';
  return g[0]+(g.length>1?'~'+g[g.length-1]:'')+'학년';
}
function logoHTML(t,cls){
  if(t.domain) return `<div class="${cls}" style="background:${tint(CATS[t.subj[0]])}"><img src="${fav(t.domain)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="ini" style="display:none">${initial(t.name)}</span></div>`;
  return `<div class="${cls}" style="background:${tint(CATS[t.subj[0]])}"><span class="ini">${initial(t.name)}</span></div>`;
}
function render(){
  let list=TOOLS.filter(match);
  list.sort((a,b)=>(b.cert*2+b.rec)-(a.cert*2+a.rec));
  document.getElementById('empty').hidden=list.length>0;
  const certN=TOOLS.filter(t=>t.cert).length;
  document.getElementById('count').innerHTML=`<b>${list.length}개</b> 도구 · 전체 ${TOOLS.length}개 · 석암 인증 ${certN}개`;
  document.getElementById('grid').innerHTML=list.map(t=>{
    const ac=CATS[t.subj[0]];
    const b=(t.cert?`<span class="seal">${ICON.seal}인증</span>`:'')+(t.rec?`<span class="rec">${ICON.star}추천</span>`:'');
    return `<div class="card" style="--accent:${ac};--accent-soft:${tint(ac)}" data-i="${TOOLS.indexOf(t)}">
      <div class="top">${logoHTML(t,'logo')}<div class="badges">${b}</div></div>
      <h3>${t.name}</h3>
      <p class="desc">${t.desc||''}</p>
      <div class="foot"><span class="subtag">${t.subj[0]}</span><span class="gtag">${gradeLabel(t)}</span></div>
    </div>`;
  }).join('');
  document.querySelectorAll('#grid .card').forEach(c=>c.addEventListener('click',()=>openModal(+c.dataset.i)));
}
function openModal(i){
  const t=TOOLS[i], ac=CATS[t.subj[0]];
  const b=(t.cert?`<span class="seal-stamp">${ICON.seal}석암 인증</span>`:'')+(t.rec?`<span class="rec-stamp">${ICON.star}교사 추천</span>`:'');
  const hasUrl=!!t.url;
  const go = hasUrl
    ? `<a class="go" href="${t.url}" target="_blank" rel="noopener">사이트 열기 ${ICON.ext}</a>`
    : `<a class="go ghost" href="https://www.google.com/search?q=${encodeURIComponent(t.name+' 에듀테크')}" target="_blank" rel="noopener">이름으로 검색 ${ICON.search}</a>`;
  document.getElementById('sheet').style.cssText=`--accent:${ac};--accent-soft:${tint(ac)}`;
  document.getElementById('sheet').innerHTML=`
    <button class="x" data-close aria-label="닫기">${ICON.x}</button>
    <div class="m-top">${logoHTML(t,'m-logo')}<div><h2>${t.name}</h2>${t.domain?`<div class="domain">${t.domain}</div>`:''}<div class="m-badges">${b}</div></div></div>
    <p class="m-desc">${t.desc||t.name}</p>
    <div class="m-meta"><span class="subtag" style="background:${ac}">${t.subj[0]}</span><span class="gtag">${gradeLabel(t)}</span></div>
    ${go}
    ${window.EDUTECH_ADMIN?`<button class="del" onclick="delTool('${t.id}')">삭제</button>`:''}`;
  const m=document.getElementById('modal'); m.hidden=false;
  m.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',closeModal));
}
function closeModal(){document.getElementById('modal').hidden=true;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function dom(u){const m=(u||'').match(/^https?:\/\/([^\/]+)/);return m?m[1]:'';}
function mapRow(r){return {id:r.id,name:r.name,one:r.one_liner||r.name,desc:r.one_liner||r.name,subj:[r.category||'기타'],grades:r.grades||[],teacher:!!r.teacher,url:r.url||'',domain:dom(r.url),cert:!!r.is_certified,rec:!!r.is_featured};}
async function load(){
  try{const r=await fetch('/api/edutech');TOOLS=(await r.json()).map(mapRow);}catch(e){TOOLS=[];}
  render();
}
// 관리자 여부: 서버가 body.admin 클래스 또는 window.EDUTECH_ADMIN=true 주입
if(window.EDUTECH_ADMIN) document.body.classList.add('admin');
// 추가 폼
const fab=document.getElementById('fab');
if(fab) fab.addEventListener('click',openForm);
function openForm(){
  const opts=CATORDER.map(c=>`<option value="${c}">${c}</option>`).join('');
  const gs=[1,2,3,4,5,6].map(g=>`<label><input type="checkbox" class="gchk-i" value="${g}">${g}학년</label>`).join('');
  document.getElementById('sheet').style.cssText='--accent:var(--seal);--accent-soft:var(--seal-bg)';
  document.getElementById('sheet').innerHTML=`
    <button class="x" data-close>${ICON.x}</button>
    <h2 style="margin:0 0 4px">도구 추가</h2>
    <div class="fld"><label>이름</label><input id="f-name" placeholder="예: 패들렛"></div>
    <div class="fld"><label>한줄 설명</label><input id="f-one" placeholder="누구나 의견을 쓸 수 있어"></div>
    <div class="fld"><label>링크 (없으면 비워두기)</label><input id="f-url" placeholder="https://..."></div>
    <div class="fld"><label>카테고리</label><select id="f-cat">${opts}</select></div>
    <div class="fld"><label>학년</label><div class="gchk">${gs}</div></div>
    <div class="fld gchk" style="margin-top:14px">
      <label><input type="checkbox" id="f-cert"> 석암 인증</label>
      <label><input type="checkbox" id="f-rec"> 교사 추천</label>
      <label><input type="checkbox" id="f-teacher"> 교사용</label>
    </div>
    <button class="go" id="f-save">저장</button>`;
  const m=document.getElementById('modal'); m.hidden=false;
  m.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',closeModal));
  document.getElementById('f-save').addEventListener('click',saveTool);
}
async function saveTool(){
  const grades=[...document.querySelectorAll('.gchk-i:checked')].map(x=>+x.value);
  const body={name:document.getElementById('f-name').value.trim(),
    one_liner:document.getElementById('f-one').value.trim(),
    url:document.getElementById('f-url').value.trim(),
    category:document.getElementById('f-cat').value, grades,
    is_certified:document.getElementById('f-cert').checked,
    is_featured:document.getElementById('f-rec').checked,
    teacher:document.getElementById('f-teacher').checked};
  if(!body.name){alert('이름을 입력하세요');return;}
  const r=await fetch('/api/edutech',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.status===403){alert('권한이 없습니다(관리자 전용).');return;}
  if(!r.ok){alert('저장 실패');return;}
  closeModal(); load();
}
async function delTool(id){
  if(!confirm('이 도구를 삭제할까요?'))return;
  const r=await fetch('/api/edutech/'+id,{method:'DELETE'});
  if(r.status===403){alert('권한이 없습니다.');return;}
  closeModal(); load();
}
load();
</script>
</body>
