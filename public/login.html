<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="/css/common.css">
<style>
  .login-shell {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 26px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 24px rgba(15,23,42,.06);
  }
  .login-card h1 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .login-card .sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .login-card input[type="password"] {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .login-card .btn { width: 100%; justify-content: center; padding: 10px; }
  .err { color: var(--danger); font-size: 12.5px; margin-bottom: 8px; min-height: 16px; }
</style>
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <h1>🔒 관리자 로그인</h1>
    <p class="sub">석암 디지털새싹 관리 페이지</p>
    <form id="login-form">
      <div class="err" id="err"></div>
      <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required>
      <button type="submit" class="btn primary">로그인</button>
    </form>
  </div>
</div>
<script>
  const form = document.getElementById('login-form');
  const errBox = document.getElementById('err');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.textContent = '';
    const password = document.getElementById('password').value;
    try {
      const res = await fetch(location.pathname, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      const j = await res.json();
      if (j.ok) {
        location.href = j.redirect || location.pathname.replace(/\/login$/, '');
      } else {
        errBox.textContent = j.error || '로그인 실패';
      }
    } catch (err) {
      errBox.textContent = '서버 오류';
    }
  });
</script>
</body>
</html>
